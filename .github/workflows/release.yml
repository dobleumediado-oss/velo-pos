name: Release Velo POS

on:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Pruebas y validaciones
        run: npm run release:check

      - name: Compilar y publicar Terminal Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run release:win:terminal

      - name: Compilar y publicar Servidor Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run release:win:server
