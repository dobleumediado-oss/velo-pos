<!DOCTYPE html>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<!-- 'unsafe-inline' en script-src es necesario: la UI usa manejadores onclick inline
     (ej. <button onclick="routeTo('caja')">) inyectados vía innerHTML en ~210 sitios.
     Sin esto, el CSP los bloquea silenciosamente y los botones dejan de responder
     (regresión introducida en v1.10.2). Sigue siendo más estricto que el histórico
     de la app (sin CSP antes de v1.10.2): no se cargan scripts remotos ni eval. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: file:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none';">
