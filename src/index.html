<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Velo POS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#0D0F12;--ink2:#1E2228;--ink3:#374151;
  --muted:#6B7280;--muted2:#9CA3AF;
  --line:#E5E7EB;--line2:#F3F4F6;
  --bg:#F9FAFB;--surface:#FFFFFF;--surface2:#F9FAFB;--surface3:#F3F4F6;
  --green:#16A34A;--green-bg:#F0FDF4;--green-line:#BBF7D0;
  --red:#DC2626;--red-bg:#FEF2F2;--red-line:#FECACA;
  --amber:#D97706;--amber-bg:#FFFBEB;--amber-line:#FDE68A;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-line:#BFDBFE;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-line:#DDD6FE;
  --orange:#EA580C;--orange-bg:#FFF7ED;--orange-line:#FED7AA;
  --r:10px;--r-sm:6px;--r-lg:14px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.08);
  --sh-lg:0 8px 32px rgba(0,0,0,.12);
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:var(--font);font-size:14px;line-height:1.5;color:var(--ink);background:var(--bg)}
#root{width:100%;height:100%;display:flex;}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}

/* ── Layout ── */
#root{display:flex;height:100vh;overflow:hidden}
.shell{display:flex;height:100vh;overflow:hidden;width:100%}
.sidebar{width:228px;min-width:228px;background:var(--ink);display:flex;flex-direction:column;transition:width .2s;z-index:50;flex-shrink:0}
.sidebar.sm{width:60px;min-width:60px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:58px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:24px}

/* ── Sidebar ── */
.sb-brand{display:flex;align-items:center;gap:10px;padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,.07);overflow:hidden;min-height:66px}
.sb-logo{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.sb-name{font-weight:800;font-size:14px;color:#fff;white-space:nowrap;letter-spacing:-.2px}
.sb-tag{font-size:9px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.1em;margin-top:1px}
.sidebar.sm .sb-name,.sidebar.sm .sb-tag,.sidebar.sm .nav-lbl,.sidebar.sm .nav-txt,.sidebar.sm .nav-badge,.sidebar.sm .sb-meta{display:none}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.28);padding:10px 8px 4px;display:block}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;white-space:nowrap;margin-bottom:1px;transition:all .12s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-item.on{background:rgba(255,255,255,.1);color:#fff}
.nav-item.on .ni svg{stroke:var(--green)}
.ni{width:17px;height:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ni svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px}
.sb-foot{padding:8px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;background:rgba(255,255,255,.05);margin-bottom:5px}
.sb-av{width:29px;height:29px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;flex-shrink:0}
.sb-meta{overflow:hidden}
.sb-uname{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:10px;color:rgba(255,255,255,.38);text-transform:capitalize}
.nav-item.logout{color:rgba(255,255,255,.35)}

/* ── Topbar ── */
.tb-toggle{width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.12s}
.tb-toggle:hover{background:var(--surface2)}
.tb-toggle svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round}
.tb-title{font-weight:700;font-size:15px;color:var(--ink)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;border:1px solid var(--line);background:var(--surface2);font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap}
.pill svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pill.open{background:var(--green-bg);border-color:var(--green-line);color:var(--green)}
.pill.closed{background:var(--red-bg);border-color:var(--red-line);color:var(--red)}
.ib{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;position:relative}
.ib:hover{background:var(--surface2)}
.ib svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ib .dot{position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--surface)}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh)}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.card-title{font-weight:700;font-size:14px;color:var(--ink)}
.card-sub{font-size:12px;color:var(--muted2);margin-top:1px}

/* ── Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh);transition:box-shadow .15s}
.metric:hover{box-shadow:var(--sh-md)}
.met-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.met-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.met-icon svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.met-icon.g{background:var(--green-bg);color:var(--green)}
.met-icon.b{background:var(--blue-bg);color:var(--blue)}
.met-icon.a{background:var(--amber-bg);color:var(--amber)}
.met-icon.r{background:var(--red-bg);color:var(--red)}
.met-icon.p{background:var(--purple-bg);color:var(--purple)}
.met-icon.o{background:var(--orange-bg);color:var(--orange)}
.met-label{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:3px}
.met-val{font-size:21px;font-weight:800;color:var(--ink);letter-spacing:-.5px}
.met-foot{display:flex;align-items:center;gap:5px;margin-top:8px}
.met-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px}
.met-badge.up{background:var(--green-bg);color:var(--green)}
.met-badge.dn{background:var(--red-bg);color:var(--red)}
.met-badge.nu{background:var(--surface3);color:var(--muted)}
.met-note{font-size:11px;color:var(--muted2)}

/* ── Table ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:9px 14px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);background:var(--surface2);border-bottom:1px solid var(--line)}
tbody td{padding:12px 14px;border-bottom:1px solid var(--line2);font-size:13px;color:var(--ink3);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.tb{color:var(--ink);font-weight:600}
.ts{font-size:11px;color:var(--muted2);margin-top:2px}
.tm{font-family:var(--mono);font-size:12px}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge.g{background:var(--green-bg);color:var(--green)}
.badge.r{background:var(--red-bg);color:var(--red)}
.badge.a{background:var(--amber-bg);color:var(--amber)}
.badge.b{background:var(--blue-bg);color:var(--blue)}
.badge.p{background:var(--purple-bg);color:var(--purple)}
.badge.o{background:var(--orange-bg);color:var(--orange)}
.badge.n{background:var(--surface3);color:var(--muted)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .12s;font-family:inherit;white-space:nowrap;line-height:1}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover{background:var(--ink2)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#15803D}
.btn-out{background:var(--surface);color:var(--ink3);border:1px solid var(--line)}
.btn-out:hover{border-color:var(--muted2);background:var(--surface2)}
.btn-ghost{background:transparent;color:var(--muted);border:none;padding:5px 9px}
.btn-ghost:hover{color:var(--ink);background:var(--surface3)}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-line)}
.btn-red:hover{background:var(--red);color:#fff}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-line)}
.btn-amber:hover{background:var(--amber);color:#fff}
.btn-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-line)}
.btn-blue:hover{background:var(--blue);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-lg{padding:11px 22px;font-size:14px}
.btn-fw{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Form ── */
.fg{margin-bottom:13px}
.lbl{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:4px;letter-spacing:.02em}
.inp{width:100%;padding:8px 11px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);color:var(--ink);font-size:13px;font-family:inherit;outline:none;transition:all .12s}
.inp:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(13,15,18,.06)}
.inp::placeholder{color:var(--muted2)}
select.inp{cursor:pointer}
.inp-ic{position:relative}
.inp-ic .inp{padding-left:34px}
.inp-ic .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted2)}
.inp-ic .ic svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.hr{border:none;border-top:1px solid var(--line);margin:14px 0}

/* ── Modal ── */
.ov{position:fixed;inset:0;background:rgba(13,15,18,.48);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:26px;width:540px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:var(--sh-lg)}
.modal-lg{width:680px}
.modal-xl{width:780px}
.modal-title{font-weight:800;font-size:16px;color:var(--ink);margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}

/* ── Alert ── */
.alrt{display:flex;gap:10px;padding:11px 13px;border-radius:var(--r-sm);margin-bottom:7px;border:1px solid;align-items:flex-start}
.alrt.r{background:var(--red-bg);border-color:var(--red-line)}
.alrt.a{background:var(--amber-bg);border-color:var(--amber-line)}
.alrt.g{background:var(--green-bg);border-color:var(--green-line)}
.alrt.b{background:var(--blue-bg);border-color:var(--blue-line)}
.alrt.o{background:var(--orange-bg);border-color:var(--orange-line)}
.alrt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.alrt-dot.r{background:var(--red)}.alrt-dot.a{background:var(--amber)}.alrt-dot.g{background:var(--green)}.alrt-dot.b{background:var(--blue)}.alrt-dot.o{background:var(--orange)}
.alrt-title{font-size:12px;font-weight:600;margin-bottom:1px}
.alrt-sub{font-size:11px;color:var(--muted)}

/* ── Progress ── */
.prog{background:var(--line);border-radius:3px;height:4px;overflow:hidden;margin-top:3px}
.prog-f{height:100%;border-radius:3px;transition:width .4s}

/* ── POS ── */
.pos-wrap{display:flex;height:calc(100vh - 58px);overflow:hidden}
.pos-cat{flex:1;overflow-y:auto;padding:16px;background:var(--bg)}
.pos-side{width:370px;background:var(--surface);border-left:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}

/* Tabs de facturas múltiples */
.invoice-tabs{display:flex;align-items:center;gap:4px;padding:10px 13px 0;border-bottom:1px solid var(--line);background:var(--surface2);overflow-x:auto;flex-shrink:0}
.inv-tab{display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:6px 6px 0 0;font-size:11px;font-weight:600;cursor:pointer;background:var(--surface3);color:var(--muted);border:1px solid var(--line);border-bottom:none;white-space:nowrap;transition:.1s}
.inv-tab.on{background:var(--surface);color:var(--ink);border-color:var(--line);margin-bottom:-1px;padding-bottom:7px}
.inv-tab .inv-tab-close{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;color:var(--muted2)}
.inv-tab .inv-tab-close:hover{background:var(--red-bg);color:var(--red)}
.inv-tab-add{width:26px;height:26px;border-radius:5px;border:1px dashed var(--line);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:16px;flex-shrink:0;transition:.12s}
.inv-tab-add:hover{border-color:var(--green);color:var(--green);background:var(--green-bg)}

.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
.prod-card{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:13px;cursor:pointer;transition:all .12s;text-align:center}
.prod-card:hover{border-color:var(--ink);box-shadow:var(--sh-md);transform:translateY(-1px)}
.prod-card.out{opacity:.4;cursor:not-allowed;pointer-events:none}
.pc-icon{width:38px;height:38px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;margin:0 auto 9px}
.pc-icon svg{width:19px;height:19px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.pc-name{font-size:11px;font-weight:600;color:var(--ink);margin-bottom:2px;line-height:1.3}
.pc-code{font-family:var(--mono);font-size:9px;color:var(--muted2);margin-bottom:5px}
.pc-price{font-size:14px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
.pc-stock{font-size:10px;font-weight:500;margin-top:2px}

/* ── Cart ── */
.cart-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--line);flex-shrink:0}
.cart-body{flex:1;overflow-y:auto;padding:9px 13px}
.cart-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--r-sm);background:var(--surface2);margin-bottom:6px;border:1px solid var(--line)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:10px;color:var(--muted);margin-top:1px}
.qc{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qb{width:22px;height:22px;border-radius:5px;border:1px solid var(--line);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--ink3);transition:.1s;font-family:inherit;line-height:1}
.qb:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.ci-total{font-size:12px;font-weight:700;color:var(--ink);flex-shrink:0;min-width:60px;text-align:right}
.cart-empty{text-align:center;padding:36px 16px;color:var(--muted2)}
.cart-empty svg{width:36px;height:36px;stroke:var(--line);fill:none;stroke-width:1.5;margin:0 auto 9px;display:block}
.cart-empty p{font-size:13px;font-weight:500}
.cart-foot{padding:13px 16px;border-top:1px solid var(--line);flex-shrink:0;background:var(--surface)}
.tr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px;color:var(--ink3)}
.tr.grand{font-weight:800;font-size:17px;color:var(--ink);border-top:1px solid var(--line);padding-top:9px;margin-top:3px;margin-bottom:0}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);background-image:radial-gradient(ellipse at 25% 40%,rgba(22,163,74,.14) 0%,transparent 55%),radial-gradient(ellipse at 75% 70%,rgba(124,58,237,.09) 0%,transparent 50%)}
.login-card{width:390px;background:var(--surface);border-radius:18px;padding:38px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.login-logo{width:48px;height:48px;background:var(--green);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 13px}
.login-logo svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.login-title{font-weight:800;font-size:21px;color:var(--ink);text-align:center;letter-spacing:-.4px}
.login-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:4px;margin-bottom:26px}
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.role-btn{padding:11px 8px;border-radius:var(--r-sm);border:2px solid var(--line);background:var(--surface2);cursor:pointer;text-align:center;transition:all .12s}
.role-btn:hover{border-color:var(--muted2)}
.role-btn.on{border-color:var(--ink);background:var(--surface)}
.role-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin:0 auto 6px}
.role-icon svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.role-lbl{font-size:12px;font-weight:600;color:var(--ink)}
.role-sub{font-size:10px;color:var(--muted);margin-top:1px}
.err{background:var(--red-bg);border:1px solid var(--red-line);border-radius:var(--r-sm);padding:9px 12px;color:var(--red);font-size:12px;margin-bottom:13px}
.demo{margin-top:14px;padding:11px;background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--line);font-size:11px;color:var(--muted);line-height:1.9}

/* ── Caja Bills ── */
.bill-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:13px}
.bill-row{display:flex;align-items:center;gap:7px;padding:8px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface2)}
.bill-den{font-size:10px;font-weight:600;color:var(--ink3);font-family:var(--mono);min-width:42px}
.bill-inp{width:44px;padding:3px 5px;border:1px solid var(--line);border-radius:4px;font-size:11px;text-align:center;font-family:var(--mono);outline:none;font-weight:600}
.bill-inp:focus{border-color:var(--ink)}
.bill-sub{font-size:10px;color:var(--muted);font-family:var(--mono);min-width:52px;text-align:right}

/* ── Report Cards ── */
.rep-card{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:all .15s}
.rep-card:hover{border-color:var(--ink);box-shadow:var(--sh-md)}
.rep-icon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.rep-icon svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── Grids & Utility ── */
.gg2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.gg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.g65{display:grid;grid-template-columns:1fr .5fr;gap:18px}
.sec-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.sec-title{font-weight:800;font-size:18px;color:var(--ink);letter-spacing:-.3px}
.sec-sub{font-size:12px;color:var(--muted);margin-top:2px}
.flex{display:flex;align-items:center;gap:8px}
.fxb{display:flex;align-items:center;justify-content:space-between}
.mt8{margin-top:8px}.mt14{margin-top:14px}.mt20{margin-top:20px}
.mb8{margin-bottom:8px}.mb14{margin-bottom:14px}.mb20{margin-bottom:20px}
.empty{text-align:center;padding:44px 20px}
.empty svg{width:36px;height:36px;stroke:var(--line);fill:none;stroke-width:1.5;margin:0 auto 10px;display:block}
.empty p{font-size:13px;font-weight:600;color:var(--muted)}
.empty span{font-size:11px;color:var(--muted2)}

/* ── Toast ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:12px;font-weight:500;z-index:999;box-shadow:var(--sh-lg);max-width:300px;animation:tup .18s ease}
@keyframes tup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease}

/* ── Bar Chart ── */
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:130px;padding:0 2px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bv{font-size:9px;color:var(--muted);font-family:var(--mono);text-align:center;white-space:nowrap}
.bb{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.bl{font-size:9px;color:var(--muted2);white-space:nowrap}

/* ── Tabs ── */
.tabs{display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-sm);padding:3px;width:fit-content;margin-bottom:14px}
.tab{padding:5px 13px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:.12s;border:none;background:transparent;font-family:inherit}
.tab.on{background:var(--surface);color:var(--ink);box-shadow:var(--sh)}

/* ── Cliente search dropdown ── */
.cli-search-wrap{position:relative}
.cli-dropdown{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--sh-md);z-index:9999;max-height:180px;overflow-y:auto;display:none}
.cli-dropdown.show{display:block}
.cli-opt{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--line2)}
.cli-opt:last-child{border-bottom:none}
.cli-opt:hover{background:var(--surface2)}
.cli-opt-name{font-weight:600;color:var(--ink)}
.cli-opt-meta{font-size:10px;color:var(--muted);margin-top:1px}

/* ── Crédito vencimiento ── */
.credit-due-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.credit-due-badge.overdue{background:var(--red-bg);color:var(--red)}
.credit-due-badge.soon{background:var(--orange-bg);color:var(--orange)}
.credit-due-badge.ok{background:var(--green-bg);color:var(--green)}

/* ── Devoluciones ── */
.devol-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:6px;background:var(--surface2)}
.devol-chk{width:16px;height:16px;cursor:pointer;accent-color:var(--green)}

/* ── Impresión térmica ── */
@media print{
  .no-print{display:none!important}
  body{background:#fff}
}

@media(max-width:1100px){.metrics{grid-template-columns:1fr 1fr}.g65{grid-template-columns:1fr}}
@media(max-width:780px){.sidebar{width:60px;min-width:60px}.sidebar .sb-name,.sidebar .sb-tag,.sidebar .nav-lbl,.sidebar .nav-txt,.sidebar .nav-badge,.sidebar .sb-meta{display:none}.pos-side{width:300px}}
</style>
